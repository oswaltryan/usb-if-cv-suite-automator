name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run unit tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$pwd\src"
          pytest tests -q
